<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="index.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class = "display">
            <input class="textbox" type="text" value="">
        </div>
        <div class="bottom">
            <div class="erase">
                <button class="button clear">CLEAR</button>
                <button class="button delete">DELETE</button>
            </div>
            <div class="noas">
                <div class = "column one">
                    <button class="button Digit7">7</button> 
                    <button class="button Digit4">4</button>
                    <button class="button Digit1">1</button>
                    <button class="button .">.</button>
                </div> 
                <div class = "column two">
                    <button class="button Digit8">8</button> 
                    <button class="button Digit5">5</button> 
                    <button class="button Digit2">2</button> 
                    <button class="button Digit0">0</button> 
                </div>
                <div class = "column three">
                    <button class="button Digit9">9</button> 
                    <button class="button Digit6">6</button> 
                    <button class="button Digit3">3</button> 
                    <button class="button equal">=</button> 
                </div>
                <div class = "column four">
                    <button class="button /">/</button> 
                    <button class="button *">×</button>
                    <button class="button -">-</button>
                    <button class="button +">+</button>
                </div>
        </div>
        </div>
    </div>
</body>
</html>
